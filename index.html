    <script>
      // function hostOshiData() {

      function concateChild() {
        videoElement = document.querySelector("#video");
        timestamp = document.querySelector("#timestamp-container");
        videoElement.appendChild(timestamp);
        timestamp.style.zIndex = 9999;
      }
      function handleOverlay() {
        var t = 0,
          n = function () {
            t++;

            videoElement = document.querySelector("#video");
            timestamp = document.querySelector("#timestamp-container");

            // 2026-04-28 15:41:21: avoid loop in set timeout if not found elements above.
            (videoElement && timestamp) || t >= 10
              ? concateChild()
              : setTimeout(n, 500 + 100 * t);
          };
        setTimeout(n, 300);
      }
      function removeTitleBar() {
        document
          .querySelector("#timestamp-title-bar")
          .classList.remove("d-flex");
        document.querySelector("#timestamp-title-bar").style.cssText =
          "display: none !important;";
        document.querySelector("#timestamp-container").style.height =
          document.querySelector("#timestamp-container").offsetHeight -
          20 +
          "px";
        qlEditor = document.querySelector("#timestamp-content");
        qlEditor.style.cssText = "height: calc(100% - 2px) !important;";
      }
      function handleRemoveTitlebar() {
        var t = 0,
          n = function () {
            t++;

            videoElement = document.querySelector("#video");
            timestamp = document.querySelector("#timestamp-container");
            titleBar = document.querySelector("#timestamp-title-bar");
            // 2026-04-28 15:41:21: avoid loop in set timeout if not found elements above.

            (videoElement && timestamp && titleBar) || t >= 10
              ? removeTitleBar()
              : setTimeout(n, 50 + 10 * t);
          };
        setTimeout(n, 30);
        // use 50 10 30 instead hundreds to there is no the appear then disappear on window
      }

      async function queryToBackend(movieName, range) {
        try {
          // var urlQuery = new URL("http://192.168.1.200:3000/query");

          urlQuery.searchParams.set("v", movieName);
          urlQuery.searchParams.set("min", range[0]);
          urlQuery.searchParams.set("max", range[1]);
          urlQuery.searchParams.set("keyword", keyword);
          urlQuery.searchParams.set("series", series.value);
          urlQuery.searchParams.set("apikey", localStorage.getItem('apikey')); //heree

          // const response = await fetch(
          //   "http://localhost:3000/query?v=UrbanMiracleDoctor&min=105&max=105",

          const response = await fetch(urlQuery);
          const data = await response.json();
          // console.log(data);

          return data; // after query, data now is an array of json object, can access to an item using data[i].ep

      async function queryToIncreaseWatched(epname, keyword) {
        //currently this only support in segmentations' tag,
        //epname: supreme_leader_EP102_17213566_446465, keyword: important
        try {
          // var urlQuery = new URL(
          //   "https://democors-210398985503.europe-west1.run.app",
          // );

          var urlQuery = new URL(
            "https://backendincreasewatched-210398985503.europe-west1.run.app",
          );

          urlQuery.searchParams.set("epname", epname);

          urlQuery.searchParams.set("keyword", keyword);

          const response = await fetch(urlQuery);
          const data = await response.text();
          console.log(
            "This is in async function, so can print in anytime, just for debugging:",
            data,
          );

          return data;
          // no need to get data
        } catch (error) {
          console.error("Fetch failed:", error);
        }
      }

      function Eposide(name, url, content, subtitlePaths, Additional2) {
        textTractArray = [];
        subtitlePaths.forEach((item, index) => {
          textTractArray.push({
            kind: "captions",
            label: item.split(".").at(-2),
            src: item,
            default: item.split(".").at(-2) === "vi",
          });
        });
        if (content != null && content.toLowerCase().includes("important")) {
          mythumbnail = "thumbnals/important.jpg";
        } else if (
          content != null &&
          content.toLowerCase().includes("action")
        ) {
          mythumbnail = "thumbnals/action.jpg";
        } else {
          mythumbnail = "thumbnals/flower.jpg";
        }

        var watched = keyword != "" ? " Watched " + getMinWatched(keyword, { Additional2: Additional2 })  : ""; // only segmentations exist keyword and Additional2 for watched monitor. the \n not appear new line in this case.

        return {
          // todo: fix here, Additional2 currently not appear on full Ep
          name: "EP" + name.split("_EP").at(-1).split("_")[0]  + watched, 
          fullname: name,
          description: "this is an adventure, so feel free to try !",
          // duration: parseInt(name.split("_EP").at(-1).split('_')[0]), // will appear the convert number in min on result 1:42 for ep 102 !
          sources: [{ src: url, type: "video/mp4" }],
          thumbnail: [
            {
              srcset: mythumbnail,
              type: "image/jpeg",
              media: "(min-width: 200px;)",
            },
            // {
            //   src: "thumbnals/flower.jpg",
            // },
          ],
          textTracks: textTractArray,
          patterns: Additional2,
        };
      }

      function getMinWatched(keyword, item) {
        // Parse JSON from item.Additional2
        console.trace("getMinWatched with keyword", keyword, "and item", item);
        const patternsList = JSON.parse(item.Additional2.replaceAll("\'", '"'));

        // Array to store watched values that match the keyword
        const watchedValues = [];

        // Loop through each pattern in patternsList
        patternsList.forEach((pattern) => {
          // Create regex from pattern.pattern and test if it matches keyword
          try {
            const regex = new RegExp(keyword, "i"); // case-insensitive
            if (regex.test(pattern.pattern)) {
              watchedValues.push(pattern.watched);
            }
          } catch (e) {
            console.error("Invalid regex pattern:", keyword, "Error:", e);
          }
        });

        // Return the minimum of all watched values, or null if no matches found
        return watchedValues.length > 0 ? Math.min(...watchedValues) : null;
      }

      async function createPlaylist(movieName, range) {
        subtitlePaths = [];
        arraySource = [];
        console.log("before query",movieName, range, keyword);
        querryArray = await queryToBackend(movieName, range);
        console.log("success query to backend", querryArray);

        // sort the data by ep. Also, move important' to top and action' to bottom.
        querryArray.sort((a, b) => a.ep - b.ep);
        if (keyword != "") {
          //only arrange the ep follow content in review mode
          var importantContent = [];
          var actionContent = [];
          var removeItems = [];

          querryArray.forEach((item, index) => {
            // console.log("check content for keyword arrange", item.content);
            if (item.content.toLowerCase().includes("important")) {
              importantContent.push(item);
              removeItems.push(index);
            } else if (item.content.toLowerCase().includes("action")) {
              actionContent.push(item);
              removeItems.push(index);
            }
          });
          querryArray = querryArray.filter(
            (item, index) => !removeItems.includes(index),
          );

          importantContent.sort(
            (a, b) => getMinWatched(keyword, a) - getMinWatched(keyword, b),
          );
          querryArray.sort(
            (a, b) => getMinWatched(keyword, a) - getMinWatched(keyword, b),
          );
          actionContent.sort(
            (a, b) => getMinWatched(keyword, a) - getMinWatched(keyword, b),
          );

          querryArray = importantContent
            .concat(querryArray)
            .concat(actionContent);
        }

        videoplaylist = new Array();
        if (keyword == "") {
          for (let i = 0; i < querryArray.length; i++) {
            url = querryArray[i].url;
            name = querryArray[i].movie + "_EP" + querryArray[i].ep.toString();
            fullcontent = querryArray[i].fullContent;
            window.queryData.push({
              name: name,
              content: fullcontent,
              Additional1: querryArray[i].Additional1,
              Additional2: "", // currently no use Additional2 in fullEp.
            });
            subtitlePaths =
              querryArray[i].subtitle === null
                ? []
                : querryArray[i].subtitle.split("\n");
            var myMovieEp = Eposide(name, url, fullcontent, subtitlePaths, "");

            videoplaylist.push(myMovieEp);
          }
        } else {
          for (let i = 0; i < querryArray.length; i++) {
            url = querryArray[i].outputFileName;
            name = querryArray[i].outputFileName
              .split("/")
              .at(-1)
              .split(".")[0];
            content = querryArray[i].content;
            window.queryData.push({
              name: name,
              content: content,
              Additional1: querryArray[i].Additional1,
              Additional2: querryArray[i].Additional2,
            });

            subtitlePaths =
              querryArray[i].subtitle === null
                ? []
                : querryArray[i].subtitle.split("\n");
            var myMovieEp = Eposide(
              name,
              url,
              content,
              subtitlePaths,
              querryArray[i].Additional2,
            );

            videoplaylist.push(myMovieEp);
          }
        }
        // if there is no item, set new, if exist, delete the old (because there is limit in storage of localStorage, also, the query info is different between each time and key must be unique)
        localStorage.setItem("queryData", JSON.stringify(window.queryData));
        localStorage.setItem("channelName", window.channelName);
        localStorage.setItem("firstLoadingIe", window.firstLoadingIe);
        console.log("Just public this info:", window.queryData);
        return videoplaylist;
      }

      async function mainThread(moviename, keyword, min, max, series) {
        keyword = keyword.toLowerCase();
        console.log("on sub mainthread keyword", keyword);
        window.player = videojs("video");
        myPlaylist = await createPlaylist(moviename, [min, max]);
        // myPlaylist.sort((a, b) => a.ep - b.ep);

        // if (keyword != "") { //only arrange the ep follow content in review mode
        //   var importantContent = [];
        //   var actionContent = [];
        //   var removeItems = [];

        //   myPlaylist.forEach((item, index) => {
        //     console.log("check content for keyword arrange", item.content);
        //     if (item.content.toLowerCase().includes("important")) {
        //       importantContent.push(item);
        //       removeItems.push(index);
        //     } else if (item.content.toLowerCase().includes("action")) {
        //       actionContent.push(item);
        //       removeItems.push(index);
        //     }
        //   });
        //   myPlaylist = myPlaylist.filter((item, index) => !removeItems.includes(index));
        // }

        console.log("success create playlist", myPlaylist);
        player.playlist([]); // clear the default playlist, otherwise, when search again, the new playlist will be added to the old one
        player.playlist(myPlaylist);

        player.playlist.autoadvance(0);
        // add hotkey function
        player.ready(function () {
          this.hotkeys({
            volumeStep: 0.1,
            seekStep: 2,
            enableModifiersForNumbers: false,
            enableFullscreen: true,
            enableInactiveFocus: true,
            enableVolumeScroll: false,
            customKeys: {
              // Create custom hotkeys
              ctrlNKey: {
                key: function (event) {
                  // play next with shift N
                  return event.shiftKey && event.which === 78;
                },
                handler: function (player, options, event) {
                  // // Using mute as an example
                  // if (options.enableMute) {
                  //   player.muted(!player.muted());
                  // }
                  player.playlist.next();
                },
              },
              ctrlPKey: {
                key: function (event) {
                  // play next with shift P
                  return event.shiftKey && event.which === 80;
                },
                handler: function (player, options, event) {
                  player.playlist.previous();
                },
              },
            },
          });
        });

        player.playlistUi({
          playOnSelect: false,
        });

        player.textTrackSettings.setValues({
          backgroundColor: "#000",
          backgroundOpacity: "0.5",
          fontPercent: 1, // 150% size
          edgeStyle: "uniform",
        });
        player.textTrackSettings.updateDisplay();

        player.on("ended", function () {
          currentEp =
            player.playlistMenu.items[player.playlist.currentItem()].item;
          // console.log("Current item has finished playing:", currentEp.fullname);
          queryToIncreaseWatched(currentEp.fullname, keyword);

          // Your code here
        });
        player.on("playlistitem", function () {
          console.log("playlist item changed");
          currentEp =
            player.playlistMenu.items[player.playlist.currentItem()].item;

          // 1. handle note editor
          document.title = currentEp.fullname;
          document.querySelector("#video_title").textContent = document.title;
          const regex = new RegExp(keyword, "i"); // case-insensitive

          // 2. move the the correct timestamp
          if (
            currentEp.patterns != "" &&
            currentEp.patterns != undefined &&
            currentEp.patterns != null &&
            currentEp.patterns != "None"
          ) {
            patternsData = currentEp.patterns.replaceAll("\'", '"');
            timestamps = JSON.parse(patternsData);
            console.log("current ep patterns data", timestamps);
            console.log("current time of player", player.currentTime());
            timestamps.some((item) => {
              // only use some because forEach not allow break
              console.log(
                "check pattern",
                item.pattern,
                "with keyword",
                keyword,
              );
              if (regex.test(item.pattern)) {
                // if (item.pattern.includes(keyword)) {
                player.currentTime(
                  item.timestamp
                    .split(":")
                    .reduce((acc, time) => 60 * acc + +time),
                );
                console.log(
                  "jump to timestamp",
                  item.timestamp,
                  "with pattern",
                  item.pattern,
                );
                return true;
              }
              return false;
            });
          }

          // handle overlay
          handleOverlay();
          // remove this class to make the display: none get effected
          if (localStorage.getItem("phone") == "yes") {
            handleRemoveTitlebar();
            // when 'injected stylesheet' mean: that .css is from a physical style.css but it is not from extension scope, not in current real.
          }
          // else {
          //   handleRemoveTitlebar();
          // }
          // console.log(document.querySelector("#timestamp-title-bar"));
        });

        // todo: import caption when confirm the subtitles are .srt format
        // await importCaption();
      }
    </script>

    <script>
      const searchButton = document.querySelector('#search-button');
      const min = document.querySelector("#min");
      const max = document.querySelector("#max");
      const series = document.querySelector("#series");
      const keywordbox = document.querySelector("#keywordbox");
      let keyword = ""; //global declaration

      searchButton.addEventListener("click", (event) => {
        keyword = keywordbox.value.trim();
        console.log("initial keyword", keyword);

        window.queryData = [];
        // Both methods retrieve the current search term
        // range is a must, but maybe no need to fill in search box, if not exist, will fill a range that is so large: 1 - 1000
        if (keyword != "") {
          // This is for review steps at segmentations, notice the <a> tag
          document.querySelector("#owner-name > a").textContent =
            "A consistency mind can change everything";
          window.channelName = "A consistency mind can change everything";
        } else {
          document.querySelector("#owner-name > a").textContent =
            "Life is an adventure"; //must exist to avoid the current page are in consistency.. but press Enter for keyword == "", then it will keep this title and classify data to wrong channel
          window.channelName = "Life is an adventure"; // use the channelName for create the timestamp when in extension when it still not defined, although channelName is captured in somewhere but at that local function maybe it still not defined.
        }

        // condition for detecting this is phone
        const fullWidth = screen.width;
        if (fullWidth < 1000) {
          alert("This is phone");
          localStorage.setItem("phone", "yes");
        } else {
          localStorage.setItem("phone", "no");
        }
        window.firstLoadingIe = "yes";
        var searchMin = min.value;
        var searchMax = max.value;
        if (series.value == "" && searchMin == "" && searchMax == "") {
          searchMin = 1;
          searchMax = 1000;
        }

        const value = document.querySelector("#site-search").value.trim();
        mainThread(
          value,
          keyword,
          parseInt(searchMin),
          parseInt(searchMax),
          series.value,
        );
        console.log("Search term:", value);
      });
